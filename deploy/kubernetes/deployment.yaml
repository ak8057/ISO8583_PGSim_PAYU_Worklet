# Example only — adjust image, resources, probes, and secrets for your environment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgsim-iso8583
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgsim-iso8583
  template:
    metadata:
      labels:
        app: pgsim-iso8583
    spec:
      containers:
        - name: pgsim
          image: your-registry/pgsim:latest
          ports:
            - containerPort: 8081
              name: http
            - containerPort: 8080
              name: iso-tcp
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: SIMULATOR_TCP_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: pgsim-iso8583
spec:
  selector:
    app: pgsim-iso8583
  ports:
    - name: http
      port: 8081
      targetPort: 8081
    - name: iso-tcp
      port: 8080
      targetPort: 8080
