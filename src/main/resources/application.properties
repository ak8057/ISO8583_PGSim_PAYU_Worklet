spring.application.name=pgsim

# Runtime mode switching: SERVER | CLIENT
simulator.mode=SERVER
simulator.tcp.enabled=true
simulator.instance.role=SERVER
simulator.mode.switch-enabled=false

# BRD default: ISO 8583 TCP on 8080. HTTP UI / REST use a separate port to avoid bind clash.
server.port=8081
simulator.tcp.port=8080
simulator.timeout=30000
pgsim.connection.timeout=30000

# BRD: optional max concurrent TCP clients (0 = unlimited)
pgsim.tcp.max-connections=0

# In-memory message log cap
pgsim.logs.max-entries=10000

# Optional: set to non-empty to require X-API-Key header on /api/**
pgsim.security.api-key=

# TR-6: TLS on ISO TCP (requires PKCS12/JKS). If enabled without keystore, server stays plain TCP and logs a stub warning.
pgsim.tcp.tls.enabled=false
pgsim.tcp.tls.keystore=
pgsim.tcp.tls.keystore-password=changeit
pgsim.tcp.tls.keystore-type=PKCS12

# CLIENT mode outbound TCP settings
simulator.client.host=127.0.0.1
# Keep client target port different from server bind port by default
simulator.client.port=8082
simulator.client.connect-timeout-ms=5000
simulator.client.response-timeout-ms=10000
simulator.client.retry-count=2
simulator.client.retry-delay-ms=500

# FR-2: dual encoding — primary ASCII packager for pack/unpack; secondary optional fallback (binary IFB_* layout).
# See docs/BRD-COMPLIANCE.md
pgsim.iso.primary-packager=iso87ascii.xml
pgsim.iso.secondary-packager=iso87binary.xml

# Optional: persist runtime MTI JSON after each config mutation (overlays classpath defaults on next restart when file exists).
pgsim.config.persistence.enabled=false
pgsim.config.persistence.path=./data/runtime-message-config.json

management.endpoints.web.exposure.include=health,metrics,info,prometheus
management.prometheus.metrics.export.enabled=true
management.endpoint.health.show-details=always

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Network Management Message (NMM) subsystem ───────────────────────────────
# Set pgsim.nmm.enabled=true to activate LOGON / ECHO / LOGOFF lifecycle in CLIENT mode.
pgsim.nmm.enabled=false
# Interval (ms) between periodic ECHO messages while session is ACTIVE
pgsim.nmm.echo-interval-ms=15000
# Max retries for any single NMM message before declaring failure
pgsim.nmm.retry-count=5
# Pause (ms) between NMM retry attempts
pgsim.nmm.retry-delay-ms=2000
# Reconnect automatically after unrecoverable NMM failure
pgsim.nmm.auto-reconnect=true
# Timeout (ms) waiting for a single NMM response
pgsim.nmm.response-timeout-ms=10000
